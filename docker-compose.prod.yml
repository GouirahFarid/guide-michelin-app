services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: michelinbot-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - michelin-network
    restart: always

  api:
    build:
      context: ./michelin-bot
      dockerfile: Dockerfile
    container_name: michelinbot-api-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./michelin-bot/michelin_my_maps.csv:/app/michelin_my_maps.csv:ro
      - ./michelin-bot/data:/app/data
    networks:
      - michelin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  frontend:
    build:
      context: ./michelin-front
      dockerfile: Dockerfile
    container_name: michelinbot-frontend-prod
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://api:8000
      PORT: 3000
    networks:
      - michelin-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: michelinbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - michelin-network
    restart: always

volumes:
  postgres_data:

networks:
  michelin-network:
    driver: bridge
