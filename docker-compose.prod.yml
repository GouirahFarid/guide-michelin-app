services:
  api:
    build:
      context: ./michelin-bot
      dockerfile: Dockerfile
    container_name: michelinbot-api-prod
    env_file:
      - ./michelin-bot/.env.prod
    environment:
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
    volumes:
      - ./michelin-bot/data:/app/data
    networks:
      - michelin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  frontend:
    build:
      context: ./michelin-front
      dockerfile: Dockerfile
    container_name: michelinbot-frontend-prod
    env_file:
      - ./michelin-front/.env.prod
    networks:
      - michelin-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: michelinbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - michelin-network
    restart: always

networks:
  michelin-network:
    driver: bridge
