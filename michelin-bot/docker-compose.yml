services:
  # MichelinBot API Application (LLM-only, no database)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: michelinbot-api
    environment:
      # Zhipu AI (set your API key in .env or override here)
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      # Server
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    networks:
      - michelinbot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  michelinbot-network:
    driver: bridge
