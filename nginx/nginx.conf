events {
    worker_connections 1024;
}

http {
    upstream backend {
        server api:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # API routes - proxy to backend, removing /api prefix
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE critical settings for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }

        # Health endpoint (direct access without /api prefix)
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # Docs endpoint (direct access without /api prefix)
        location /docs {
            proxy_pass http://backend/docs;
            proxy_set_header Host $host;
        }

        # Frontend SPA - everything else goes to frontend (including /chat)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
