services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: michelinbot-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-michelin_db}
      POSTGRES_USER: ${POSTGRES_USER:-michelin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-michelin_user} -d ${POSTGRES_DB:-michelin_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - michelin-network

  api:
    build:
      context: ./michelin-bot
      dockerfile: Dockerfile
    container_name: michelinbot-api
    environment:
      DATABASE_URL: postgresql+psycopg://michelin_user:root@postgres:5432/michelin_db
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ALLOWED_ORIGINS: http://localhost
      HOST: 0.0.0.0
      PORT: 8000
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./michelin-bot/michelin_my_maps.csv:/app/michelin_my_maps.csv:ro
      - ./michelin-bot/data:/app/data
    networks:
      - michelin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./michelin-front
      dockerfile: Dockerfile
    container_name: michelinbot-frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - michelin-network

  nginx:
    image: nginx:alpine
    container_name: michelinbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - michelin-network

volumes:
  postgres_data:

networks:
  michelin-network:
    driver: bridge
