services:
  api:
    build:
      context: ./michelin-bot
      dockerfile: Dockerfile
    container_name: michelinbot-api
    environment:
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
      HOST: 0.0.0.0
      PORT: 8000
    expose:
      - "8000"
    volumes:
      - ./michelin-bot/data:/app/data
    networks:
      - michelin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./michelin-front
      dockerfile: Dockerfile
    container_name: michelinbot-frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - michelin-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: michelinbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - michelin-network
    restart: unless-stopped

networks:
  michelin-network:
    driver: bridge
